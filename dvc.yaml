stages:
  train:
    cmd: python scripts/train.py
    deps:
      - scripts/train.py
      - data/features/train_features.csv
      - params.yaml
    params:
      - split.validation_ratio
      - general.random_state
      - models.random_forest
      - models.xgboost
      - models.linear_regression
      - mlflow.experiment_name
    metrics:
      - reports/model_comparison.csv
    outs:
      - reports/best_model_summary.json

  predict:
    cmd: python scripts/predict.py
    deps:
      - scripts/predict.py
      - data/features/test_features.csv
      - reports/model_comparison.csv
      - params.yaml
    outs:
      - reports/predictions.csv

  evaluate:
    cmd: python scripts/evaluate.py
    deps:
      - scripts/evaluate.py
      - reports/model_comparison.csv
      - reports/best_model_summary.json
      - params.yaml
    outs:
      - reports/final_metrics.json
      - reports/evaluation_report.txt
      - reports/model_rmse_comparison.png
