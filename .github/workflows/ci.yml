name: Full MLOps CI Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  pipeline:
    runs-on: self-hosted

    steps:
      # 1. Checkout code
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2. Verify Local Python
      - name: Check Python
        run: |
          python --version
          python -m pip --version

      # 3. Install dependencies
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # 4. Pull DVC data
      - name: DVC Pull
        run: python -m dvc pull

      # 5. Run Unit Tests
      - name: Run Unit Tests
        run: |
          python -m pytest tests/test_api.py tests/test_model_server.py -v

      # 6. Start Airflow Stack
      - name: Start Airflow
        run: |
          docker compose up -d

      # 7. Wait for Airflow Health (replaces fixed timeout)
      - name: Wait for Airflow Startup
        shell: powershell
        run: |
          $maxAttempts = 30
          $attempt = 0
          while ($attempt -lt $maxAttempts) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080/health" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                Write-Host "Airflow is healthy."
                exit 0
              }
            } catch {}
            Write-Host "Waiting for Airflow..."
            Start-Sleep -Seconds 10
            $attempt++
          }
          Write-Error "Airflow failed to become healthy in time."
          exit 1

      # 8. Trigger DAG
      - name: Trigger Retail Demand DAG
        shell: powershell
        run: |
          $container = docker ps --filter "name=airflow-webserver" --format "{{.Names}}"

          Write-Host "Using container: $container"

          docker exec $container airflow dags trigger retail_demand_pipeline

      # 9. Wait for DAG Completion (replaces blind timeout)
      - name: Wait for DAG Run
        shell: powershell
        run: |
          $container = docker ps --filter "name=airflow-webserver" --format "{{.Names}}"

          $maxAttempts = 40
          $attempt = 0

          while ($attempt -lt $maxAttempts) {

            $state = docker exec $container airflow dags state retail_demand_pipeline (Get-Date -Format yyyy-MM-dd) 2>$null

            Write-Host "Current DAG state: $state"

            if ($state -match "success") {
              Write-Host "DAG completed successfully."
              exit 0
            }

            if ($state -match "failed") {
              Write-Error "DAG failed."
              exit 1
            }

            Start-Sleep -Seconds 15
            $attempt++
          }

          Write-Error "DAG did not finish in time."
          exit 1

      # 10. Run DVC Training
      - name: Run Training Pipeline
        run: |
          python -m dvc repro

      # 11. Build Deployment Images
      - name: Build Deployment Stack
        run: |
          docker compose -f docker-compose.deploy.yaml build

      # 12. Start Deployment
      - name: Start Deployment Stack
        run: |
          docker compose -f docker-compose.deploy.yaml up -d

      # 13. Wait for APIs
      - name: Wait for APIs
        shell: powershell
        run: |
          $maxAttempts = 20
          $attempt = 0
          while ($attempt -lt $maxAttempts) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8000/health" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                Write-Host "API is healthy."
                exit 0
              }
            } catch {}
            Write-Host "Waiting for API..."
            Start-Sleep -Seconds 5
            $attempt++
          }
          Write-Error "API failed to start."
          exit 1

      # 14. Run Integration Tests
      - name: Run Integration Tests
        run: |
          python -m pytest tests/test_integration.py -v

      # 15. Cleanup
      - name: Stop Containers
        if: always()
        run: |
          docker compose down
          docker compose -f docker-compose.deploy.yaml down
