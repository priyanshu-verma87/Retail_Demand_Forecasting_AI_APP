# params.yaml

data:
  train_path: data/features/train_features.csv

paths:
  model_dir: models
  output_dir: reports
  mlruns_dir: mlruns

split:
  validation_ratio: 0.20

general:
  random_state: 42

mlflow:
  tracking_uri: file:./mlruns
  experiment_name: retail-demand-forecasting
  registered_model_name: RetailDemandModel

models:
  linear_regression: true

  random_forest:
    enabled: true
    n_estimators: 150
    max_depth: 14
    n_jobs: -1

  xgboost:
    enabled: true
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 12
    subsample: 0.8
    colsample_bytree: 0.8
    n_jobs: -1

drift:
  threshold_percent: 20
